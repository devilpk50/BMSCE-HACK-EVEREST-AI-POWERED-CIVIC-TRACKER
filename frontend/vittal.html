<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste Management Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>

        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
        }

        #map{
            height:100vh;
            width:100%;
        }

        .title{
            position:absolute;
            top:10px;
            left:50px;
            z-index:1000;
            background:white;
            padding:10px 20px;
            border-radius:10px;
            font-size:20px;
            font-weight:bold;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>

<div class="title">
    Smart Waste Management - Bengaluru
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Heatmap Plugin -->
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script>

    // =========================
    // CREATE MAP
    // =========================

    const map = L.map('map').setView([12.9716, 77.5946], 12);

    // =========================
    // TILE LAYER
    // =========================

    L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {
        attribution: '&copy; OpenStreetMap & CartoDB',
        subdomains: 'abcd',
        maxZoom: 20
    }
    ).addTo(map);

    // =========================
    // DUMMY REPORT DATA
    // =========================

    const reports = [

        {
            lat:12.9716,
            lng:77.5946,
            intensity:1
        },

        {
            lat:12.9352,
            lng:77.6245,
            intensity:0.8
        },

        {
            lat:12.9980,
            lng:77.6762,
            intensity:0.9
        },

        {
            lat:12.9279,
            lng:77.6271,
            intensity:0.7
        }

    ];

    // =========================
    // MARKERS
    // =========================

    reports.forEach(report => {

        L.marker([report.lat, report.lng])

        .addTo(map)

        .bindPopup("Waste Report");

    });

    // =========================
    // HEATMAP POINTS
    // =========================

    const heatPoints = reports.map(r => [
        r.lat,
        r.lng,
        r.intensity
    ]);

    // =========================
    // CREATE HEATMAP
    // =========================

    const heat = L.heatLayer(heatPoints, {

        radius: 25,
        blur: 15,
        maxZoom: 17,

        gradient: {
            0.4: 'blue',
            0.65: 'lime',
            1: 'red'
        }

    }).addTo(map);

    // =========================
    // REFRESH HEATMAP FROM API
    // =========================

    async function refreshHeatmap() {

        try {

            const response = await fetch(
                "http://localhost:8000/get-locations"
            );

            const data = await response.json();

            // Update heatmap
            heat.setLatLngs(data);

            console.log("Heatmap Updated");

        }

        catch(error) {

            console.log("API Error:", error);

        }

    }

    // =========================
    // AUTO REFRESH EVERY 10 SEC
    // =========================

    setInterval(refreshHeatmap, 10000);

</script>

</body>
</html>
